<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 79 - CSS Grid Generator with Naming - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .split-view {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }
        @media (min-width: 900px) {
            .split-view { grid-template-columns: 350px 1fr; }
        }
        .controls-panel {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .grid-preview {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #grid-canvas {
            display: grid;
            width: 100%;
            height: 350px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--border-color);
        }

        .grid-cell {
            background: rgba(86, 182, 194, 0.2);
            border: 1px solid rgba(86, 182, 194, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            user-select: none;
        }

        .grid-cell:hover {
            background: rgba(86, 182, 194, 0.4);
        }

        .grid-cell.active {
            background: rgba(86, 182, 194, 0.6);
            border-color: #fff;
        }

        .grid-cell input {
            background: transparent;
            border: none;
            color: #fff;
            text-align: center;
            width: 90%;
            font-size: 0.9rem;
            font-weight: bold;
            outline: none;
        }
        
        .grid-cell input:focus {
            background: rgba(0,0,0,0.5);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-control {
            background: #000;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.6rem;
            font-family: var(--font-mono);
            outline: none;
        }

        .css-output {
            background: #1e1e1e;
            color: #7ee787;
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
            margin-top: 1rem;
        }

        /* 3D Canvas wrapper */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body class="theme-dark">
    <div id="canvas-container"></div>
    <main class="main-content" style="padding-top:2rem;">
        <div class="container" style="max-width: 1200px;">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>79. CSS Grid Generator with Naming</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="glass-panel">
                <div class="split-view">
                    
                    <div class="controls-panel">
                        <div class="control-group">
                            <label>Columns (e.g. 1fr 2fr 1fr)</label>
                            <input type="text" id="inp-cols" class="form-control" value="1fr 1fr 1fr">
                        </div>
                        <div class="control-group">
                            <label>Rows (e.g. 100px 1fr 50px)</label>
                            <input type="text" id="inp-rows" class="form-control" value="100px 1fr 100px">
                        </div>
                        <div class="control-group">
                            <label>Gap (e.g. 10px)</label>
                            <input type="text" id="inp-gap" class="form-control" value="10px">
                        </div>
                        <hr style="border-color:#333; margin: 0.5rem 0;">
                        <div>
                            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.4;">
                                Click on a cell in the grid to name its area. Identically named adjacent cells form a merged grid area. Use "." for empty cells.
                            </p>
                            <button class="btn btn-sm" style="width:100%;" id="btn-reset">Reset Area Names</button>
                        </div>
                    </div>

                    <div class="grid-preview">
                        <h3>Interactive Grid</h3>
                        <div id="grid-canvas"></div>
                        
                        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top: 1rem;">
                            <h3>CSS Output</h3>
                            <button class="btn btn-sm" id="btn-copy">Copy CSS</button>
                        </div>
                        <div class="css-output" id="css-output"></div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        const inpCols = document.getElementById('inp-cols');
        const inpRows = document.getElementById('inp-rows');
        const inpGap = document.getElementById('inp-gap');
        const gridCanvas = document.getElementById('grid-canvas');
        const cssOutput = document.getElementById('css-output');
        const btnReset = document.getElementById('btn-reset');
        const btnCopy = document.getElementById('btn-copy');

        let cells = [];

        function parseTemplate(str) {
            return str.trim().split(/\s+/).filter(Boolean);
        }

        function generateGrid() {
            const cols = parseTemplate(inpCols.value);
            const rows = parseTemplate(inpRows.value);
            const gap = inpGap.value.trim();

            if(cols.length === 0) cols.push('1fr');
            if(rows.length === 0) rows.push('1fr');

            gridCanvas.style.gridTemplateColumns = cols.join(' ');
            gridCanvas.style.gridTemplateRows = rows.join(' ');
            gridCanvas.style.gap = gap;

            const totalCells = cols.length * rows.length;
            
            // Preserve existing names if within bounds
            const oldNames = cells.map(c => c.querySelector('input').value);
            
            gridCanvas.innerHTML = '';
            cells = [];

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                
                const input = document.createElement('input');
                input.type = 'text';
                
                // assign default basic names for demo
                let defaultVal = '.';
                if (oldNames[i]) {
                    defaultVal = oldNames[i];
                } else {
                    let r = Math.floor(i / cols.length);
                    if (r === 0) defaultVal = 'header';
                    else if (r === rows.length - 1) defaultVal = 'footer';
                    else if (i % cols.length === 0) defaultVal = 'sidebar';
                    else defaultVal = 'main';
                }

                input.value = defaultVal;
                input.placeholder = '.';
                
                input.addEventListener('input', updateCSS);
                input.addEventListener('focus', () => cell.classList.add('active'));
                input.addEventListener('blur', () => cell.classList.remove('active'));

                cell.appendChild(input);
                gridCanvas.appendChild(cell);
                cells.push(cell);
            }

            updateCSS();
            update3DGrid(cols.length, rows.length);
        }

        function updateCSS() {
            const cols = parseTemplate(inpCols.value);
            const rows = parseTemplate(inpRows.value);
            const gap = inpGap.value.trim();

            let areasStr = '';
            for (let r = 0; r < rows.length; r++) {
                let rowAreas = [];
                for (let c = 0; c < cols.length; c++) {
                    const idx = r * cols.length + c;
                    let val = cells[idx].querySelector('input').value.trim() || '.';
                    // simple validation for CSS area names
                    val = val.replace(/[^a-zA-Z0-9_-]/g, '') || '.';
                    rowAreas.push(val);
                }
                areasStr += `    "${rowAreas.join(' ')}"\n`;
            }

            const css = `.grid-container {
  display: grid;
  grid-template-columns: ${cols.join(' ')};
  grid-template-rows: ${rows.join(' ')};
  gap: ${gap};
  grid-template-areas: \n${areasStr.trimEnd()};
}`;
            cssOutput.textContent = css;
        }

        inpCols.addEventListener('input', generateGrid);
        inpRows.addEventListener('input', generateGrid);
        inpGap.addEventListener('input', generateGrid);

        btnReset.addEventListener('click', () => {
            cells.forEach(c => c.querySelector('input').value = '.');
            updateCSS();
        });

        btnCopy.addEventListener('click', () => {
            navigator.clipboard.writeText(cssOutput.textContent);
            btnCopy.textContent = 'Copied!';
            setTimeout(() => { btnCopy.textContent = 'Copy CSS'; }, 2000);
        });

        // 3D Scene setup
        let scene, camera, renderer, gridGroup;
        
        function init3D() {
            const container = document.getElementById('canvas-container');
            if(!container) return;
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 20;
            camera.position.y = -5;
            camera.position.x = 10;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            gridGroup = new THREE.Group();
            scene.add(gridGroup);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate3D();
        }

        function update3DGrid(cols, rows) {
            if(!gridGroup) return;
            
            // clear old grid
            while(gridGroup.children.length > 0){ 
                gridGroup.remove(gridGroup.children[0]); 
            }

            const cellSize = 2;
            const gap = 0.5;

            const totalWidth = cols * cellSize + (cols - 1) * gap;
            const totalHeight = rows * cellSize + (rows - 1) * gap;

            const startX = -totalWidth / 2 + cellSize / 2;
            const startY = totalHeight / 2 - cellSize / 2;

            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x56b6c2, 
                transparent: true,
                opacity: 0.6,
                wireframe: true
            });

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const box = new THREE.Mesh(new THREE.BoxGeometry(cellSize, cellSize, 0.5), mat);
                    box.position.set(
                        startX + c * (cellSize + gap),
                        startY - r * (cellSize + gap),
                        0
                    );
                    gridGroup.add(box);
                }
            }
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            gridGroup.rotation.y = Math.sin(Date.now() * 0.0005) * 0.3;
            gridGroup.rotation.x = Math.sin(Date.now() * 0.0003) * 0.2;

            renderer.render(scene, camera);
        }

        document.addEventListener('DOMContentLoaded', () => {
            init3D();
            generateGrid();
        });
    </script>
</body>
</html>
