<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 1 - JSON Formatter Validator - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .json-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
            height: calc(100vh - 200px);
            min-height: 600px;
        }

        @media (min-width: 900px) {
            .json-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            height: 100%;
            resize: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 1rem;
            background: var(--bg-main);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            outline: none;
            transition: border-color 0.3s;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--accent-primary);
        }

        .output-container {
            height: 100%;
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            position: relative;
            transition: border-color 0.3s;
        }

        .output-container.success {
            border-color: #33d9b2;
        }

        .output-container.error {
            border-color: #ff5252;
        }

        .json-key {
            color: var(--accent-primary);
        }

        .json-string {
            color: #33d9b2;
        }

        .json-number {
            color: #ffb142;
        }

        .json-boolean {
            color: #34ace0;
        }

        .json-null {
            color: #ff5252;
        }

        .error-panel {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 82, 82, 0.1);
            border-left: 4px solid #ff5252;
            border-radius: var(--radius-sm);
            color: #ff5252;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            display: none;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
        }

        /* 3D background container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body class="theme-dark">
    <div id="canvas-container"></div>

    <main class="main-content">
        <div class="container">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>1. JSON Formatter Validator</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="json-grid">
                <!-- Input Panel -->
                <div class="glass-panel editor-container">
                    <div class="editor-header">
                        <h3>Input JSON</h3>
                        <div class="controls">
                            <button id="btn-clear" class="btn">Clear</button>
                            <button id="btn-paste" class="btn">Paste</button>
                        </div>
                    </div>
                    <textarea id="json-input" placeholder="Paste your minified or messy JSON here..."></textarea>
                </div>

                <!-- Output Panel -->
                <div class="glass-panel editor-container">
                    <div class="editor-header">
                        <h3>Formatted Output</h3>
                        <div class="controls">
                            <button id="btn-minify" class="btn">Minify</button>
                            <button id="btn-copy" class="btn btn-primary">Copy</button>
                        </div>
                    </div>
                    <div id="json-output" class="output-container"></div>
                    <div id="error-panel" class="error-panel"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>

    <script>
        // Tool Logic
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('json-input');
            const output = document.getElementById('json-output');
            const errorPanel = document.getElementById('error-panel');
            const btnClear = document.getElementById('btn-clear');
            const btnPaste = document.getElementById('btn-paste');
            const btnMinify = document.getElementById('btn-minify');
            const btnCopy = document.getElementById('btn-copy');

            // Default sample
            const defaultSample = {
                "name": "Developer Toolbox",
                "version": "1.0",
                "features": ["formatting", "validation", "highlighting"],
                "active": true,
                "metadata": null,
                "author": { "name": "Aliriyaj007" }
            };
            input.value = JSON.stringify(defaultSample, null, 2);

            const syntaxHighlight = (json) => {
                if (typeof json != 'string') {
                    json = JSON.stringify(json, undefined, 2);
                }
                json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'json-key';
                            // remove quote from key if we want, but let's keep them for strict JSON
                        } else {
                            cls = 'json-string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                });
            };

            const processJSON = (minify = false) => {
                const raw = input.value.trim();
                output.innerHTML = '';
                errorPanel.style.display = 'none';
                output.classList.remove('success', 'error');

                if (!raw) {
                    window.update3DScene && window.update3DScene(true); // reset
                    return;
                }

                try {
                    const parsed = JSON.parse(raw);
                    const formatted = JSON.stringify(parsed, null, minify ? 0 : 4);

                    if (minify) {
                        output.textContent = formatted;
                    } else {
                        output.innerHTML = syntaxHighlight(formatted);
                    }

                    output.classList.add('success');
                    window.update3DScene && window.update3DScene(true);

                } catch (e) {
                    output.classList.add('error');
                    errorPanel.style.display = 'block';
                    errorPanel.textContent = '❌ Invalid JSON: ' + e.message;
                    window.update3DScene && window.update3DScene(false);
                }
            };

            input.addEventListener('input', () => processJSON(false));

            btnMinify.addEventListener('click', () => {
                processJSON(true);
            });

            btnClear.addEventListener('click', () => {
                input.value = '';
                processJSON(false);
            });

            btnPaste.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    input.value = text;
                    processJSON(false);
                } catch (err) {
                    alert('Failed to read clipboard');
                }
            });

            btnCopy.addEventListener('click', () => {
                const text = output.textContent; // get raw text without html spans
                navigator.clipboard.writeText(text).then(() => {
                    const originalText = btnCopy.textContent;
                    btnCopy.textContent = 'Copied!';
                    setTimeout(() => btnCopy.textContent = originalText, 2000);
                });
            });

            // Initial process
            processJSON(false);
        });
    </script>

    <!-- Three.js Scene: Floating Cubes representing JSON structure -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        let scene, camera, renderer, cubes = [];

        const init3D = () => {
            const container = document.getElementById('canvas-container');
            if (!container || !window.THREE) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            const getThemeColor = () => {
                const style = getComputedStyle(document.body);
                return new THREE.Color(style.getPropertyValue('--accent-primary').trim() || '#BB86FC');
            };

            const material = new THREE.MeshPhongMaterial({
                color: getThemeColor(),
                transparent: true,
                opacity: 0.6,
                shininess: 100
            });

            // Create 27 cubes (3x3x3 grid)
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            let offset = 2.5;

            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const mesh = new THREE.Mesh(geo, material.clone());

                        // Default valid grid position
                        mesh.userData.targetPos = new THREE.Vector3(x * offset, y * offset, z * offset);

                        // Start scrambled
                        mesh.position.set(
                            (Math.random() - 0.5) * 20,
                            (Math.random() - 0.5) * 20,
                            (Math.random() - 0.5) * 20
                        );

                        mesh.userData.rx = (Math.random() - 0.5) * 0.02;
                        mesh.userData.ry = (Math.random() - 0.5) * 0.02;

                        scene.add(mesh);
                        cubes.push(mesh);
                    }
                }
            }

            window.addEventListener('themechanged', () => {
                setTimeout(() => {
                    const c = getThemeColor();
                    cubes.forEach(cube => cube.material.color = c);
                }, 50);
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        // Expose function to update cubes state
        window.update3DScene = (isValid) => {
            if (!scene) return;

            if (isValid) {
                // Return to neat 3x3x3 grid
                cubes.forEach(cube => {
                    gsap.to(cube.position, {
                        x: cube.userData.targetPos.x,
                        y: cube.userData.targetPos.y,
                        z: cube.userData.targetPos.z,
                        duration: 1.5,
                        ease: "power2.out"
                    });
                    gsap.to(cube.material, { opacity: 0.8, duration: 1 });
                });
            } else {
                // Scatter randomly
                cubes.forEach(cube => {
                    gsap.to(cube.position, {
                        x: (Math.random() - 0.5) * 30,
                        y: (Math.random() - 0.5) * 30,
                        z: (Math.random() - 0.5) * 30,
                        duration: 1.5,
                        ease: "bounce.out"
                    });
                    gsap.to(cube.material, { opacity: 0.3, duration: 1 });
                });
            }
        };

        const animate = () => {
            requestAnimationFrame(animate);

            // Group rotation
            scene.rotation.y += 0.002;
            scene.rotation.x += 0.001;

            // Individual gentle spin
            cubes.forEach(c => {
                c.rotation.x += c.userData.rx;
                c.rotation.y += c.userData.ry;
            });

            renderer.render(scene, camera);
        };

        document.addEventListener('DOMContentLoaded', init3D);
    </script>
</body>

</html>
