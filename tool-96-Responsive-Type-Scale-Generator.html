<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 96 - Responsive Type Scale Generator - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .split-view {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
            height: calc(100vh - 250px);
            min-height: 600px;
        }

        @media (min-width: 900px) {
            .split-view {
                grid-template-columns: 350px 1fr;
            }
        }

        .controls-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            z-index: 2;
        }

        .config-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .config-block label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: bold;
        }

        .config-block input, .config-block select {
            background: var(--bg-main);
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 0.8rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            outline: none;
        }

        .preview-panel {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .visual-preview {
            flex: 2;
            padding: 2rem;
            overflow-y: auto;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .type-row {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        .type-label {
            width: 80px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        
        .type-text {
            color: var(--text-primary);
            font-family: var(--font-sans);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .css-output {
            flex: 1;
            background: #111;
            padding: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: #7ee787;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* 3D background wrapper */
        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body class="theme-dark">
    <div id="canvas-container"></div>
    <main class="main-content" style="padding-top:2rem;">
        <div class="container" style="max-width: 1400px; position:relative; z-index:2;">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>96. Responsive Type Scale Generator</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="split-view">
                <!-- Controls -->
                <div class="controls-panel">
                    <h3>Scale Settings</h3>
                    
                    <div class="config-block">
                        <label>Base Size (px)</label>
                        <input type="number" id="base-size" value="16" min="8" max="32">
                    </div>

                    <div class="config-block">
                        <label>Scale Ratio</label>
                        <select id="ratio-select">
                            <option value="1.067">1.067 - Minor Second</option>
                            <option value="1.125">1.125 - Major Second</option>
                            <option value="1.200">1.200 - Minor Third</option>
                            <option value="1.250" selected>1.250 - Major Third</option>
                            <option value="1.333">1.333 - Perfect Fourth</option>
                            <option value="1.414">1.414 - Augmented Fourth</option>
                            <option value="1.500">1.500 - Perfect Fifth</option>
                            <option value="1.618">1.618 - Golden Ratio</option>
                        </select>
                    </div>

                    <div class="config-block">
                        <label>Steps Above Base</label>
                        <input type="number" id="steps-up" value="5" min="1" max="10">
                    </div>

                    <div class="config-block">
                        <label>Steps Below Base</label>
                        <input type="number" id="steps-down" value="2" min="0" max="5">
                    </div>

                    <button class="btn btn-primary" id="btn-copy" style="margin-top:auto;">Copy CSS Variables</button>
                    <p style="font-size:0.75rem; color:#aaa; margin-top:0.5rem; text-align:center;">
                        Updates instantly as you type.
                    </p>
                </div>

                <!-- Preview -->
                <div class="preview-panel">
                    <div class="visual-preview" id="preview-box">
                        <!-- Filled by JS -->
                    </div>
                    <div class="css-output" id="css-box">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="global-footer" style="position:relative; z-index:2;">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const iBase = document.getElementById('base-size');
        const iRatio = document.getElementById('ratio-select');
        const iUp = document.getElementById('steps-up');
        const iDown = document.getElementById('steps-down');
        const previewBox = document.getElementById('preview-box');
        const cssBox = document.getElementById('css-box');
        const btnCopy = document.getElementById('btn-copy');

        let scaleData = [];

        function generateScale() {
            const base = parseFloat(iBase.value) || 16;
            const ratio = parseFloat(iRatio.value) || 1.25;
            const up = parseInt(iUp.value) || 5;
            const down = parseInt(iDown.value) || 2;

            scaleData = [];

            // Generate downwards
            for(let i = down; i > 0; i--) {
                const size = base / Math.pow(ratio, i);
                scaleData.push({ step: -i, px: size, rem: size / base });
            }

            // Generate base
            scaleData.push({ step: 0, px: base, rem: 1 });

            // Generate upwards
            for(let i = 1; i <= up; i++) {
                const size = base * Math.pow(ratio, i);
                scaleData.push({ step: i, px: size, rem: size / base });
            }

            renderUI();
            if(window.update3DStairs) window.update3DStairs(scaleData);
        }

        function renderUI() {
            // Preview HTML
            let html = '';
            // Render highest to lowest (visually inverted so largest is at top)
            [...scaleData].reverse().forEach(s => {
                let name = s.step > 0 ? `h${6 - s.step}` : (s.step === 0 ? 'p' : `sm-${Math.abs(s.step)}`);
                if(s.step > 5) name = 'display';
                
                html += `
                <div class="type-row">
                    <div class="type-label">Step ${s.step > 0 ? '+'+s.step : s.step}<br>${s.px.toFixed(2)}px</div>
                    <div class="type-text" style="font-size: ${s.rem}rem; line-height: 1.2;">
                        The quick brown fox jumps over the lazy dog
                    </div>
                </div>`;
            });
            previewBox.innerHTML = html;

            // CSS HTML
            let css = ':root {\n';
            css += `  /* Type Scale: ${iRatio.options[iRatio.selectedIndex].text} */\n`;
            css += `  /* Base: ${iBase.value}px */\n`;
            scaleData.forEach(s => {
                let varName = s.step === 0 ? '--text-base' : (s.step > 0 ? `--text-xl${s.step}` : `--text-sm${Math.abs(s.step)}`);
                css += `  ${varName}: ${s.rem.toFixed(3)}rem; /* ${s.px.toFixed(2)}px */\n`;
            });
            css += '}';
            cssBox.textContent = css;
        }

        [iBase, iRatio, iUp, iDown].forEach(el => el.addEventListener('input', generateScale));
        
        btnCopy.addEventListener('click', () => {
            navigator.clipboard.writeText(cssBox.textContent);
            AppCore.showToast('CSS copied to clipboard!');
        });

        generateScale();

        // 3D Background - Staircase representing scale
        let scene, camera, renderer, stairsGroup;

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(20, 10, 20);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            stairsGroup = new THREE.Group();
            scene.add(stairsGroup);

            window.update3DStairs = (data) => {
                while(stairsGroup.children.length > 0) stairsGroup.remove(stairsGroup.children[0]);

                const style = getComputedStyle(document.body);
                const aColor = style.getPropertyValue('--accent-primary').trim() || '#BB86FC';
                const mat = new THREE.MeshPhongMaterial({ color: aColor, transparent: true, opacity: 0.8, shininess: 80 });

                let curX = -10;
                let curY = -5;

                data.forEach((s, i) => {
                    const width = 2;
                    const height = s.rem * 2; // scale height representation
                    const depth = 5;

                    const geo = new THREE.BoxGeometry(width, height, depth);
                    const mesh = new THREE.Mesh(geo, mat);
                    
                    curX += 2.5;
                    mesh.position.set(curX, curY + (height/2), 0);
                    
                    stairsGroup.add(mesh);
                });

                // Center group
                stairsGroup.position.x = -curX/2;
            };

            update3DStairs(scaleData);

            window.addEventListener('themechanged', () => {
                update3DStairs(scaleData);
            });

            const animate = () => {
                requestAnimationFrame(animate);
                stairsGroup.rotation.y += 0.002;
                renderer.render(scene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        document.addEventListener('DOMContentLoaded', init3D);

    </script>
</body>
</html>
