<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 24 - Character Counter with Unicode Analysis - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .counter-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-top: 2rem; }
        @media (min-width: 900px) { .counter-grid { grid-template-columns: 2fr 1fr; } }
        
        #text-input {
            width: 100%;
            height: 300px;
            font-family: inherit;
            font-size: 1.1rem;
            padding: 1rem;
            background: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            resize: vertical;
        }
        #text-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(var(--primary-color-rgb), 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1rem;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            font-family: var(--font-mono);
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.25rem;
        }

        .block-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }
        .block-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .block-item:last-child { border-bottom: none; }
        .block-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        .block-name { color: var(--text-primary); }
        .block-count { font-family: var(--font-mono); color: var(--text-secondary); background: rgba(255,255,255,0.1); padding: 0.2rem 0.6rem; border-radius: var(--radius-sm); }
    </style>
</head>
<body class="theme-dark">
    <div class="tool-canvas-container" id="canvas-container"></div>
    <main class="main-content">
        <div class="container">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>24. Character Counter with Unicode Analysis</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="counter-grid">
                <div class="glass-panel">
                    <h3>Text Input</h3>
                    <p class="text-secondary mb-4">Paste or type text below to analyze its composition.</p>
                    <textarea id="text-input" placeholder="Type something here (e.g. Hello World 👋)..."></textarea>
                </div>

                <div>
                    <div class="glass-panel mb-4">
                        <h3>Detailed Stats</h3>
                        <div class="stats-grid mt-4">
                            <div class="stat-box">
                                <div class="stat-value" id="stat-chars">0</div>
                                <div class="stat-label">Characters</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="stat-words">0</div>
                                <div class="stat-label">Words</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="stat-bytes">0</div>
                                <div class="stat-label">Bytes (UTF-8)</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="stat-lines">0</div>
                                <div class="stat-label">Lines</div>
                            </div>
                        </div>

                        <ul class="block-list">
                            <li class="block-item">
                                <span class="block-name">No Spaces</span>
                                <span class="block-count" id="stat-nospace">0</span>
                            </li>
                            <li class="block-item">
                                <span class="block-name">ASCII Only</span>
                                <span class="block-count" id="stat-ascii">0</span>
                            </li>
                        </ul>
                    </div>

                    <div class="glass-panel">
                        <h3>Unicode Blocks Used</h3>
                        <ul class="block-list mt-4" id="unicode-blocks-list">
                            <li class="block-item text-secondary">Awaiting input...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // Analysis Logic
        const blockColors = {
            "Basic Latin": "#3498db",
            "Latin-1 Supplement": "#9b59b6",
            "Cyrillic": "#e74c3c",
            "Devanagari": "#f1c40f",
            "Hiragana": "#2ecc71",
            "Katakana": "#1abc9c",
            "CJK Unified Ideographs": "#e67e22",
            "Emojis & Symbols": "#ff4757",
            "Other / Extended": "#95a5a6"
        };

        function getBlockName(code) {
            if (code <= 0x007F) return "Basic Latin";
            if (code <= 0x00FF) return "Latin-1 Supplement";
            if (code >= 0x0400 && code <= 0x04FF) return "Cyrillic";
            if (code >= 0x0900 && code <= 0x097F) return "Devanagari";
            if (code >= 0x3040 && code <= 0x309F) return "Hiragana";
            if (code >= 0x30A0 && code <= 0x30FF) return "Katakana";
            if (code >= 0x4E00 && code <= 0x9FFF) return "CJK Unified Ideographs";
            
            // Emoji ranges (approximated for general categorization)
            if ((code >= 0x1F300 && code <= 0x1F5FF) || 
                (code >= 0x1F600 && code <= 0x1F64F) || 
                (code >= 0x1F680 && code <= 0x1F6FF) || 
                (code >= 0x2600 && code <= 0x26FF) ||
                (code >= 0x2700 && code <= 0x27BF)) return "Emojis & Symbols";
                
            return "Other / Extended";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('text-input');
            const stChars = document.getElementById('stat-chars');
            const stWords = document.getElementById('stat-words');
            const stBytes = document.getElementById('stat-bytes');
            const stLines = document.getElementById('stat-lines');
            const stNoSpace = document.getElementById('stat-nospace');
            const stAscii = document.getElementById('stat-ascii');
            const blockList = document.getElementById('unicode-blocks-list');

            const updateStats = () => {
                const text = input.value;
                if(!text) {
                    stChars.textContent = '0';
                    stWords.textContent = '0';
                    stBytes.textContent = '0';
                    stLines.textContent = '0';
                    stNoSpace.textContent = '0';
                    stAscii.textContent = '0';
                    blockList.innerHTML = '<li class="block-item text-secondary">Awaiting input...</li>';
                    if(window.clear3D) window.clear3D();
                    return;
                }

                // Chars (accounting for surrogate pairs)
                const chars = Array.from(text);
                stChars.textContent = chars.length;

                // Words
                const words = text.trim().split(/\s+/).filter(w => w.length > 0);
                stWords.textContent = words.length;

                // Bytes
                stBytes.textContent = new Blob([text]).size;

                // Lines
                const lines = text.split(/\r\n|\r|\n/);
                stLines.textContent = lines.length;

                // No Space
                const noSpace = text.replace(/\s/g, '').length; // approximate without surrogate parsing
                // Proper surrogate count without spaces:
                stNoSpace.textContent = chars.filter(c => !/\s/.test(c)).length;

                // ASCII
                let asciiCount = 0;
                let blocksFound = {};

                chars.forEach(c => {
                    const code = c.codePointAt(0);
                    if(code <= 127) asciiCount++;
                    
                    const blockName = getBlockName(code);
                    if(!blocksFound[blockName]) blocksFound[blockName] = { count: 0, sampleChars: [] };
                    blocksFound[blockName].count++;
                    
                    if(blocksFound[blockName].sampleChars.length < 5 && c.trim()) {
                        blocksFound[blockName].sampleChars.push(c);
                    }
                });

                stAscii.textContent = asciiCount;

                // Render blocks
                blockList.innerHTML = '';
                Object.keys(blocksFound).sort((a,b) => blocksFound[b].count - blocksFound[a].count).forEach(bName => {
                    const color = blockColors[bName] || '#fff';
                    const li = document.createElement('li');
                    li.className = 'block-item';
                    li.innerHTML = `
                        <div>
                            <span class="block-color" style="background:${color}"></span>
                            <span class="block-name">${bName}</span>
                        </div>
                        <span class="block-count">${blocksFound[bName].count}</span>
                    `;
                    blockList.appendChild(li);
                });

                // Update 3D
                if(window.update3D) window.update3D(blocksFound);
            };

            input.addEventListener('input', updateStats);
            
            // Trigger sample on load
            input.value = "Hello World! 🌍\nThis is a test with English and some 日本語.";
            updateStats();
        });
    </script>
    <script>
        // Three.js 3D Visualization - Floating Letter Sprites
        let scene, camera, renderer, spritesGroup;
        let sprites = [];

        function init3D() {
            const container = document.getElementById('canvas-container');
            if(!container || !window.THREE) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            spritesGroup = new THREE.Group();
            scene.add(spritesGroup);

            // Shift it left behind the text box slightly
            spritesGroup.position.x = -2;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function createLetterSprite(char, colorStr) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0,0,128,128);
            
            // Add subtle glow
            ctx.shadowColor = colorStr;
            ctx.shadowBlur = 10;
            
            ctx.font = 'bold 80px sans-serif';
            ctx.fillStyle = colorStr;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9 });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(2, 2, 1);
            return sprite;
        }

        window.clear3D = () => {
            if(!spritesGroup) return;
            sprites.forEach(s => spritesGroup.remove(s.mesh));
            sprites = [];
        };

        window.update3D = (blocksFound) => {
            if(!scene) return;
            window.clear3D();

            let delayScale = 0;

            Object.keys(blocksFound).forEach(bName => {
                const color = window.blockColors[bName] || '#ffffff';
                const samples = blocksFound[bName].sampleChars;
                
                // create max 5 sprites per block
                samples.forEach((char) => {
                    const spriteMesh = createLetterSprite(char, color);
                    
                    // random start pos
                    spriteMesh.position.set(
                        (Math.random() - 0.5) * 15,
                        -10, // start below
                        (Math.random() - 0.5) * 5
                    );

                    const targetY = (Math.random() - 0.5) * 8;

                    const spriteObj = {
                        mesh: spriteMesh,
                        targetY: targetY,
                        speed: 0.05 + Math.random() * 0.03,
                        wobbleOff: Math.random() * Math.PI * 2,
                        wobbleSpeed: 0.01 + Math.random() * 0.02
                    };
                    
                    spritesGroup.add(spriteMesh);
                    sprites.push(spriteObj);
                });
            });
        };

        function animate() {
            requestAnimationFrame(animate);

            if(spritesGroup) {
                spritesGroup.rotation.y = Math.sin(Date.now() * 0.0005) * 0.1;
                
                sprites.forEach(s => {
                    // Float up to targetY
                    if(s.mesh.position.y < s.targetY) {
                        s.mesh.position.y += Math.min((s.targetY - s.mesh.position.y) * 0.05, s.speed);
                    }
                    
                    // Wobble horizontally
                    s.mesh.position.x += Math.sin(Date.now() * s.wobbleSpeed + s.wobbleOff) * 0.01;
                });
            }

            renderer.render(scene, camera);
        }

        document.addEventListener('DOMContentLoaded', init3D);
    </script>
</body>
</html>
