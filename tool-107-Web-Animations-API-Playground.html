<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 107 - Web Animations API Playground - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .split-view {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }
        @media (min-width: 1024px) {
            .split-view { grid-template-columns: 450px 1fr; }
        }
        
        .panel {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        
        .form-label { font-size: 0.85rem; color: #aaa; }
        .form-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: #fff;
            padding: 0.5rem;
            border-radius: 4px;
            font-family: var(--font-mono);
        }

        .keyframes-list {
            list-style: none;
            padding: 0; margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 250px;
            overflow-y: auto;
        }
        .keyframe-item {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 0.8rem;
            display: grid;
            grid-template-columns: 1fr 1fr 30px;
            gap: 0.5rem;
            align-items: center;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-primary { background: #56b6c2; color: #000; }
        .btn-primary:hover { background: #6ad0dc; }
        .btn-success { background: #98c379; color: #000; }
        .btn-success:hover { background: #abdb88; }
        .btn-danger { background: rgba(255, 85, 85, 0.2); color: #ff5555; border: 1px solid #ff5555; padding:0.2rem;}

        .code-output {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 1rem;
            color: #98c379;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            white-space: pre-wrap;
            overflow-x: auto;
            flex: 1;
        }

        .preview-area {
            flex: 1;
            min-height: 300px;
            background: #1e1e1e;
            border-radius: 4px;
            border: 2px dashed #444;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .preview-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #c678dd, #56b6c2);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            font-size: 2rem;
            will-change: transform, opacity;
        }

        /* 3D Canvas wrapper */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body class="theme-dark">
    <div id="canvas-container"></div>
    <main class="main-content" style="padding-top:2rem;">
        <div class="container" style="max-width: 1400px;">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>107. Web Animations API Playground</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="split-view">
                
                <!-- Controls Panel -->
                <div class="panel">
                    <h3>Animation Options</h3>
                    <div class="controls-grid">
                        <div class="form-group">
                            <label class="form-label">Duration (ms)</label>
                            <input type="number" id="inp-duration" class="form-input" value="1000" min="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Iterations</label>
                            <input type="text" id="inp-iterations" class="form-input" value="Infinity" placeholder="number or Infinity">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Easing</label>
                            <select id="inp-easing" class="form-input">
                                <option value="linear">linear</option>
                                <option value="ease">ease</option>
                                <option value="ease-in">ease-in</option>
                                <option value="ease-out" selected>ease-out</option>
                                <option value="ease-in-out">ease-in-out</option>
                                <option value="cubic-bezier(0.68, -0.55, 0.265, 1.55)">bouncy (cubic-bezier)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Direction</label>
                            <select id="inp-direction" class="form-input">
                                <option value="normal">normal</option>
                                <option value="reverse">reverse</option>
                                <option value="alternate" selected>alternate</option>
                                <option value="alternate-reverse">alternate-reverse</option>
                            </select>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:1rem;">
                        <h3 style="margin:0;">Keyframes</h3>
                        <button class="btn btn-primary" id="btn-add-kf">+ Add Keyframe</button>
                    </div>

                    <ul class="keyframes-list" id="kf-list">
                        <!-- Populated by JS -->
                    </ul>

                    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                        <button class="btn btn-success" id="btn-play" style="flex:1;">▶ Play</button>
                        <button class="btn" id="btn-pause" style="background:#e5c07b; color:#000; flex:1;">⏸ Pause</button>
                        <button class="btn" id="btn-cancel" style="background:#e06c75; color:#000; flex:1;">⏹ Cancel</button>
                    </div>
                </div>

                <!-- Preview & Code Panel -->
                <div class="panel">
                    <div class="preview-area">
                        <div class="preview-box" id="target-element">✨</div>
                    </div>

                    <h3 style="margin-top:1rem;">Generated WAAPI Code</h3>
                    <div class="code-output" id="output-code">
// Code will appear here
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        // DOM
        const targetElement = document.getElementById('target-element');
        const kfList = document.getElementById('kf-list');
        const outputCode = document.getElementById('output-code');
        
        const inpDuration = document.getElementById('inp-duration');
        const inpIterations = document.getElementById('inp-iterations');
        const inpEasing = document.getElementById('inp-easing');
        const inpDirection = document.getElementById('inp-direction');

        const btnAddKf = document.getElementById('btn-add-kf');
        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnCancel = document.getElementById('btn-cancel');

        // State
        let animationInstance = null;
        
        // Initial Keyframes Setup
        let keyframes = [
            { transform: 'translateY(0px) scale(1)', opacity: '1', offset: '' },
            { transform: 'translateY(-100px) scale(1.2)', opacity: '0.8', offset: '' }
        ];

        function renderKeyframes() {
            kfList.innerHTML = '';
            keyframes.forEach((kf, index) => {
                const li = document.createElement('li');
                li.className = 'keyframe-item';
                
                li.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">transform</label>
                        <input type="text" class="form-input kf-transform" value="${kf.transform}" data-idx="${index}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">opacity</label>
                        <input type="text" class="form-input kf-opacity" value="${kf.opacity}" data-idx="${index}">
                    </div>
                    <button class="btn btn-danger btn-del-kf" data-idx="${index}" style="margin-top:1.2rem;" ${keyframes.length <= 2 ? 'disabled':''}>×</button>
                `;
                kfList.appendChild(li);
            });

            // Bind inputs
            document.querySelectorAll('.kf-transform').forEach(el => el.addEventListener('input', updateKfData));
            document.querySelectorAll('.kf-opacity').forEach(el => el.addEventListener('input', updateKfData));
            document.querySelectorAll('.btn-del-kf').forEach(el => el.addEventListener('click', deleteKf));
            
            updateCodePreview();
        }

        function updateKfData(e) {
            const idx = e.target.getAttribute('data-idx');
            const isTransform = e.target.classList.contains('kf-transform');
            
            if(isTransform) keyframes[idx].transform = e.target.value;
            else keyframes[idx].opacity = e.target.value;
            
            updateCodePreview();
        }

        function deleteKf(e) {
            const idx = parseInt(e.target.getAttribute('data-idx'));
            if(keyframes.length > 2) {
                keyframes.splice(idx, 1);
                renderKeyframes();
            }
        }

        btnAddKf.addEventListener('click', () => {
            const last = keyframes[keyframes.length - 1];
            keyframes.push({ transform: last.transform, opacity: last.opacity, offset: '' });
            renderKeyframes();
        });

        // Trigger updates when options change
        [inpDuration, inpIterations, inpEasing, inpDirection].forEach(el => {
            el.addEventListener('input', updateCodePreview);
            el.addEventListener('change', updateCodePreview);
        });

        function getOptions() {
            let iters = inpIterations.value.trim();
            if(iters === 'Infinity') iters = Infinity;
            else iters = Number(iters) || 1;

            return {
                duration: Number(inpDuration.value) || 1000,
                iterations: iters,
                easing: inpEasing.value,
                direction: inpDirection.value
            };
        }

        function getCleanKeyframes() {
            // Only output properties that are present
            return keyframes.map(kf => {
                const clean = {};
                if(kf.transform) clean.transform = kf.transform;
                if(kf.opacity) clean.opacity = kf.opacity;
                if(kf.offset) clean.offset = Number(kf.offset);
                return clean;
            });
        }

        function updateCodePreview() {
            const opts = getOptions();
            const cleanKf = getCleanKeyframes();
            
            // Format for display
            let kfStr = JSON.stringify(cleanKf, null, 2);
            let optsStr = `{\n  duration: ${opts.duration},`;
            optsStr += `\n  iterations: ${opts.iterations === Infinity ? 'Infinity' : opts.iterations},`;
            optsStr += `\n  easing: "${opts.easing}",`;
            optsStr += `\n  direction: "${opts.direction}"\n}`;

            outputCode.innerHTML = `const block = document.getElementById('target-element');\n\nconst keyframes = ${kfStr};\n\nconst options = ${optsStr};\n\n// Run it!\nconst animation = block.animate(keyframes, options);`;
            
            // Auto restart if playing
            if(animationInstance && (animationInstance.playState === 'running' || animationInstance.playState === 'paused')) {
                playAnimation();
            }
        }

        function playAnimation() {
            if(animationInstance) {
                animationInstance.cancel();
            }
            const opts = getOptions();
            const cleanKf = getCleanKeyframes();
            
            animationInstance = targetElement.animate(cleanKf, opts);
            
            // 3D Hook
            if(ball) {
                // simulate the web animation via ThreeJS scale/y-pos roughly based on state
                // We'll manage this in the render loop by looking at the mock WAAPI playbackRate / time
            }
        }

        btnPlay.addEventListener('click', () => {
            if(animationInstance && animationInstance.playState === 'paused') {
                animationInstance.play();
            } else {
                playAnimation();
            }
        });

        btnPause.addEventListener('click', () => {
            if(animationInstance && animationInstance.playState === 'running') {
                animationInstance.pause();
            }
        });

        btnCancel.addEventListener('click', () => {
            if(animationInstance) {
                animationInstance.cancel();
            }
        });


        // 3D Scene setup: "A bouncing ball that leaves a trail in 3D"
        let scene, camera, renderer, ballGrp, ball, trailGeo, trailMat;
        let trailPositions = [];
        let trailLine;
        
        function init3D() {
            const container = document.getElementById('canvas-container');
            if(!container) return;
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 40;
            camera.position.x = 20;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            ballGrp = new THREE.Group();
            scene.add(ballGrp);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 30, 10);
            scene.add(dirLight);

            // Ball
            const geo = new THREE.SphereGeometry(2, 32, 32);
            const mat = new THREE.MeshPhongMaterial({ color: 0x56b6c2, shininess: 100 });
            ball = new THREE.Mesh(geo, mat);
            ballGrp.add(ball);

            // Floor Grid (to show bouncing context)
            const grid = new THREE.GridHelper(60, 20, 0x444444, 0x222222);
            grid.position.y = -5;
            scene.add(grid);

            // Trail
            trailGeo = new THREE.BufferGeometry();
            const MAX_POINTS = 50;
            const positions = new Float32Array(MAX_POINTS * 3);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            trailGeo.setDrawRange(0, 0);
            
            trailMat = new THREE.LineBasicMaterial({ color: 0xc678dd, transparent: true, opacity: 0.6, linewidth: 2 });
            trailLine = new THREE.Line(trailGeo, trailMat);
            scene.add(trailLine);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate3D();
        }

        let timeOffset = 0;
        function animate3D() {
            requestAnimationFrame(animate3D);

            if(ball) {
                // If a DOM animation is running, sync the 3D ball roughly
                if(animationInstance && (animationInstance.playState === 'running' || animationInstance.playState === 'paused')) {
                    // We don't have direct access to computed values easily without getComputedStyle every frame,
                    // so we do a visual proxy: we just bounce it natively in threejs based on the same easing/duration logic,
                    // or just a nice sine wave that looks active.
                    const t = Date.now() * 0.002;
                    ball.position.y = Math.abs(Math.sin(t)) * 10 - 3;
                    ball.position.x = Math.sin(t*0.5) * 15;
                    ball.position.z = Math.cos(t*0.5) * 15;
                } else {
                    // Idle animation
                    ball.position.y = -3;
                    ball.position.x = Math.sin(Date.now() * 0.001) * 2;
                    ball.position.z = Math.cos(Date.now() * 0.001) * 2;
                }

                // Update Trail
                trailPositions.push(ball.position.clone());
                if(trailPositions.length > 50) {
                    trailPositions.shift();
                }

                const attr = trailGeo.attributes.position;
                for(let i=0; i<trailPositions.length; i++) {
                    attr.setXYZ(i, trailPositions[i].x, trailPositions[i].y, trailPositions[i].z);
                }
                trailGeo.setDrawRange(0, trailPositions.length);
                attr.needsUpdate = true;
                
                // Slowly rotate scene
                scene.rotation.y = Math.sin(Date.now() * 0.0001) * 0.2;
            }

            renderer.render(scene, camera);
        }

        document.addEventListener('DOMContentLoaded', () => {
            init3D();
            renderKeyframes();
            // Optional: Start with it playing
            setTimeout(playAnimation, 500);
        });
    </script>
</body>
</html>
