<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 78 - HTML to JSX Converter - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .split-view {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        @media (min-width: 900px) {
            .split-view { grid-template-columns: 1fr 1fr; }
        }
        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            height: 400px;
        }
        textarea.code-editor {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: #e0e0e0;
            resize: none;
            outline: none;
        }
        textarea.code-editor:focus {
            border-color: var(--primary-color);
        }
        .log-panel {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-top: 1.5rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
        .log-item {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .log-type {
            font-weight: bold;
            display: inline-block;
            min-width: 80px;
        }
        .log-attr { color: #34ace0; }
        .log-style { color: #ffb142; }
        .log-tag { color: #33d9b2; }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body class="theme-dark">
    <div id="canvas-container"></div>
    <main class="main-content">
        <div class="container" style="max-width: 1400px;">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>78. HTML to JSX Converter</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="glass-panel">
                <div class="split-view">
                    <div class="editor-container">
                        <div class="header-actions">
                            <h3>HTML Input</h3>
                            <button class="btn btn-sm" id="btn-clear">Clear</button>
                        </div>
                        <textarea id="html-input" class="code-editor" placeholder="Paste your HTML here...
<div class=&quot;example&quot; style=&quot;color: red; margin-top: 10px;&quot;>
  <img src=&quot;image.png&quot;>
  <label for=&quot;inp&quot;>Name</label>
  <input type=&quot;text&quot; id=&quot;inp&quot; tabindex=&quot;1&quot;>
</div>"></textarea>
                    </div>

                    <div class="editor-container">
                        <div class="header-actions">
                            <h3>JSX Output</h3>
                            <button class="btn btn-sm" id="btn-copy">Copy to Clipboard</button>
                        </div>
                        <textarea id="jsx-output" class="code-editor" readonly></textarea>
                    </div>
                </div>

                <div class="log-panel">
                    <h4>Transformation Log</h4>
                    <div id="log-content">Waiting for input...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // Tool Logic
        const htmlInput = document.getElementById('html-input');
        const jsxOutput = document.getElementById('jsx-output');
        const logContent = document.getElementById('log-content');
        const btnClear = document.getElementById('btn-clear');
        const btnCopy = document.getElementById('btn-copy');

        const attributeMapping = {
            'class': 'className',
            'for': 'htmlFor',
            'tabindex': 'tabIndex',
            'maxlength': 'maxLength',
            'minlength': 'minLength',
            'readonly': 'readOnly',
            'autocomplete': 'autoComplete',
            'autofocus': 'autoFocus',
            'colspan': 'colSpan',
            'rowspan': 'rowSpan',
            'srcset': 'srcSet',
            'crossorigin': 'crossOrigin',
            'enctype': 'encType',
            'spellcheck': 'spellCheck',
            'contenteditable': 'contentEditable'
        };

        const selfClosingTags = new Set([
            'area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input',
            'link', 'meta', 'param', 'source', 'track', 'wbr'
        ]);

        function cssToObject(cssString) {
            const rules = cssString.split(';').filter(rule => rule.trim() !== '');
            const obj = {};
            rules.forEach(rule => {
                const parts = rule.split(':');
                if (parts.length >= 2) {
                    const key = parts[0].trim().replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                    const value = parts.slice(1).join(':').trim();
                    obj[key] = value;
                }
            });
            return obj;
        }

        function convertToJSX() {
            const html = htmlInput.value;
            if (!html.trim()) {
                jsxOutput.value = '';
                logContent.innerHTML = 'Waiting for input...';
                return;
            }

            const parser = new DOMParser();
            
            let doc;
            let isSVG = false;
            if (html.trim().toLowerCase().startsWith('<svg')) {
                doc = parser.parseFromString(`<div id="root-temp">${html}</div>`, 'text/html');
                isSVG = true;
            } else {
                doc = parser.parseFromString(`<div id="root-temp">${html}</div>`, 'text/html');
            }

            const rootTemp = doc.getElementById('root-temp');
            if (!rootTemp) {
                jsxOutput.value = 'Error parsing HTML.';
                return;
            }

            let logs = [];
            
            function processNode(node, indentAmount) {
                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.textContent;
                    if (text.trim() === '') {
                        if (text.includes('\n')) return '\n' + '  '.repeat(indentAmount);
                        return ''; 
                    }
                    text = text.replace(/{/g, '{"{"}').replace(/}/g, '{"}"}');
                    return text;
                }
                
                if (node.nodeType === Node.COMMENT_NODE) {
                    logs.push(`<div class="log-item"><span class="log-type log-tag">[Comment]</span> Converted HTML comment to JSX comment.</div>`);
                    return `{/* ${node.textContent} */}`;
                }

                if (node.nodeType === Node.ELEMENT_NODE) {
                    let tagName = node.tagName.toLowerCase();
                    
                    let res = `<${tagName}`;
                    let styleObjStr = '';
                    
                    for (let attr of node.attributes) {
                        let name = attr.name;
                        let val = attr.value;
                        
                        if (name === 'style') {
                            const obj = cssToObject(val);
                            const propsStr = Object.keys(obj).map(k => `${k}: '${obj[k]}'`).join(', ');
                            styleObjStr = ` style={{ ${propsStr} }}`;
                            logs.push(`<div class="log-item"><span class="log-type log-style">[Style]</span> Converted inline style to object on &lt;${tagName}&gt;</div>`);
                            continue;
                        }
                        
                        let jsxName = attributeMapping[name] || name;
                        
                        if (name.startsWith('data-') || name.startsWith('aria-')) {
                            jsxName = name;
                        } else if (name.includes('-') && !name.startsWith('data-') && !name.startsWith('aria-')) {
                            jsxName = name.replace(/-([a-z])/g, g => g[1].toUpperCase());
                        }

                        if (jsxName !== name) {
                            logs.push(`<div class="log-item"><span class="log-type log-attr">[Attribute]</span> Mapped <strong>${name}</strong> to <strong>${jsxName}</strong> on &lt;${tagName}&gt;</div>`);
                        }
                        
                        if (val === '') {
                            res += ` ${jsxName}`;
                        } else {
                            let escapedVal = val.replace(/"/g, '&quot;');
                            res += ` ${jsxName}="${escapedVal}"`;
                        }
                    }
                    
                    res += styleObjStr;
                    
                    if (selfClosingTags.has(tagName)) {
                        res += ' />';
                        logs.push(`<div class="log-item"><span class="log-type log-tag">[Tag]</span> Converted &lt;${tagName}&gt; to self-closing &lt;${tagName} /&gt;</div>`);
                    } else {
                        res += '>';
                        
                        let innerJSX = '';
                        node.childNodes.forEach(child => {
                            innerJSX += processNode(child, indentAmount + 1);
                        });
                        
                        res += innerJSX + `</${tagName}>`;
                    }
                    return res;
                }
                return '';
            }

            let result = '';
            rootTemp.childNodes.forEach(child => {
                let r = processNode(child, 0);
                if (r) result += r + '\n';
            });
            
            result = formatBasic(result);

            jsxOutput.value = result.trim();
            
            if (logs.length === 0) {
                logContent.innerHTML = 'No complex transformations occurred.';
            } else {
                let uniqueLogs = [...new Set(logs)];
                logContent.innerHTML = uniqueLogs.join('');
            }
            
            triggerAnimation();
        }

        function formatBasic(str) {
            let formatted = '';
            let indent = 0;
            const lines = str.replace(/>\s*</g, '>\n<').split('\n');
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                
                if (line.match(/^<\/[a-zA-Z0-9_-]+>$/)) {
                    indent = Math.max(0, indent - 1);
                }
                
                formatted += '  '.repeat(indent) + line + '\n';
                
                if (line.match(/^<[^\/!].*[^\/]>$/) && !line.includes('</')) {
                    indent++;
                }
            });
            return formatted;
        }

        htmlInput.addEventListener('input', convertToJSX);
        
        btnClear.addEventListener('click', () => {
            htmlInput.value = '';
            jsxOutput.value = '';
            logContent.innerHTML = 'Waiting for input...';
        });

        btnCopy.addEventListener('click', () => {
            if (jsxOutput.value) {
                navigator.clipboard.writeText(jsxOutput.value);
                btnCopy.textContent = 'Copied!';
                setTimeout(() => { btnCopy.textContent = 'Copy to Clipboard'; }, 2000);
            }
        });

        // 3D Scene setup
        let scene, camera, renderer, shapeMesh;
        let isHTML = true; 
        
        function init3D() {
            const container = document.getElementById('canvas-container');
            if(!container) return;
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 25;
            camera.position.x = 10;
            camera.position.y = -5;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            // Shape starting as a harsh block (HTML)
            const geometry = new THREE.BoxGeometry(10, 10, 10);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0xe34f26, 
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });
            shapeMesh = new THREE.Mesh(geometry, material);
            scene.add(shapeMesh);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate3D();
        }

        let targetColor = new THREE.Color(0xe34f26);
        let morphProg = 0;

        function triggerAnimation() {
            isHTML = !isHTML; // toggle state
            targetColor.setHex(isHTML ? 0xe34f26 : 0x61dafb); // React blue
            morphProg = isHTML ? 0 : 1;
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            shapeMesh.rotation.x += 0.002;
            shapeMesh.rotation.y += 0.003;

            shapeMesh.material.color.lerp(targetColor, 0.05);
            
            const targetScale = isHTML ? 1.0 : 1.2;
            shapeMesh.scale.x += (targetScale - shapeMesh.scale.x) * 0.05;
            shapeMesh.scale.y += (targetScale - shapeMesh.scale.y) * 0.05;
            shapeMesh.scale.z += (targetScale - shapeMesh.scale.z) * 0.05;
            
            renderer.render(scene, camera);
        }

        document.addEventListener('DOMContentLoaded', () => {
            init3D();
            if(htmlInput.value.trim() !== '') convertToJSX();
        });
    </script>
</body>
</html>
