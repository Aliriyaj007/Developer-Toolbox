<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 93 - Microfrontend Architecture Visualizer - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
            height: calc(100vh - 200px);
            min-height: 600px;
        }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; height: auto; }
        }

        .controls-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .canvas-panel {
            background: #050505;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        #mfe-canvas {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .config-block {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .node-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .node-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0.5rem; border-radius: 4px; font-family: var(--font-mono); font-size: 0.85rem;}
        
        button.add-btn { background: transparent; border: 1px dashed var(--accent-primary); color: var(--accent-primary); padding: 0.5rem; cursor: pointer; border-radius: 4px; transition: all 0.2s;}
        button.add-btn:hover { background: rgba(187, 134, 252, 0.1); }
    </style>
</head>
<body class="theme-dark">
    <main class="main-content" style="padding-top:2rem;">
        <div class="container" style="max-width: 1400px; height:100%;">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>93. Microfrontend Architecture Visualizer</h1>
                </div>
            </div>

            <div class="layout">
                <!-- Config Panel -->
                <div class="controls-panel">
                    <h3>Architecture Configuration</h3>
                    <p style="font-size:0.85rem; color:#aaa;">Define host and remotes to visualize dependency mapping.</p>
                    
                    <div class="config-block">
                        <label style="color:var(--text-secondary); font-size:0.8rem; text-transform:uppercase;">Host Application</label>
                        <input type="text" id="host-name" value="App Shell (React)" style="margin-top:0.5rem; font-weight:bold;">
                    </div>

                    <div class="config-block">
                        <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem; align-items:center;">
                            <label style="color:var(--text-secondary); font-size:0.8rem; text-transform:uppercase;">Remote Modules</label>
                            <button class="add-btn" id="add-remote" style="padding: 0.2rem 0.6rem;">+ Add</button>
                        </div>
                        <div class="node-list" id="remote-list"></div>
                    </div>

                    <button class="btn btn-primary" id="btn-draw" style="margin-top:auto;">Render Graph</button>
                </div>

                <!-- 3D Graph -->
                <div class="canvas-panel">
                    <div id="mfe-canvas"></div>
                    <div style="position:absolute; bottom:1rem; right:1rem; color:#aaa; font-size:0.85rem; pointer-events:none;">
                        Drag to rotate • Scroll to zoom
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- We need OrbitControls to drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const hostNameInput = document.getElementById('host-name');
        const remoteList = document.getElementById('remote-list');
        const btnDraw = document.getElementById('btn-draw');

        let remotes = [
            { id: 1, name: "Auth MFE (Vue)" },
            { id: 2, name: "Dashboard MFE (React)" },
            { id: 3, name: "Settings MFE (Svelte)" },
            { id: 4, name: "Checkout MFE (Angular)" }
        ];

        function renderList() {
            remoteList.innerHTML = '';
            remotes.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'node-item';
                d.innerHTML = `
                    <input type="text" value="${r.name}" onchange="updateRemote(${r.id}, this.value)" style="background:transparent; border:none; color:#fff; width:100%; outline:none;">
                    <button style="background:none; border:none; color:#ff5555; cursor:pointer; font-size:1.2rem; padding:0; margin-left:0.5rem;" title="Remove Node" onclick="removeRemote(${r.id})">×</button>
                `;
                remoteList.appendChild(d);
            });
        }

        window.updateRemote = (id, val) => {
            const r = remotes.find(x => x.id === id);
            if(r) r.name = val;
        };

        window.removeRemote = (id) => {
            remotes = remotes.filter(x => x.id !== id);
            renderList();
        };

        document.getElementById('add-remote').addEventListener('click', () => {
            remotes.push({ id: Date.now(), name: "New MFE" });
            renderList();
        });

        // 3D Visualizer
        let scene, camera, renderer, controls;
        let graphGroup = new THREE.Group();

        function init3D() {
            const container = document.getElementById('mfe-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 15, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            if(window.THREE.OrbitControls) {
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
            }

            const amb = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(amb);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(10, 20, 10);
            scene.add(dir);

            scene.add(graphGroup);

            btnDraw.addEventListener('click', drawGraph);

            drawGraph();

            const animate = () => {
                requestAnimationFrame(animate);
                if(controls) controls.update();
                renderer.render(scene, camera);
            };
            animate();

            window.addEventListener('resize', () => {
                if(!container) return;
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function createLabel(text, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const context = canvas.getContext('2d');
            
            // Background box pill
            context.fillStyle = 'rgba(0,0,0,0.8)';
            context.beginPath();
            context.roundRect(0, 0, 512, 128, 64);
            context.fill();

            // Outline
            context.strokeStyle = colorHex;
            context.lineWidth = 10;
            context.stroke();

            // Text
            context.font = 'bold 48px monospace';
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, 256, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(8, 2, 1);
            return sprite;
        }

        function drawGraph() {
            // Remove existing
            while(graphGroup.children.length > 0) { 
                graphGroup.remove(graphGroup.children[0]); 
            }

            const style = getComputedStyle(document.body);
            const aColor = style.getPropertyValue('--accent-primary').trim() || '#BB86FC';
            const sColor = style.getPropertyValue('--accent-secondary').trim() || '#03DAC6';

            // Base Grid
            const grid = new THREE.GridHelper(40, 40, 0x333333, 0x222222);
            grid.position.y = -5;
            graphGroup.add(grid);

            // Host Node
            const hostGeo = new THREE.BoxGeometry(4, 4, 4);
            const hostMat = new THREE.MeshPhongMaterial({ color: aColor, opacity: 0.9, transparent:true });
            const hostMesh = new THREE.Mesh(hostGeo, hostMat);
            graphGroup.add(hostMesh);

            const hostLabel = createLabel(hostNameInput.value, aColor);
            hostLabel.position.y = 4.5;
            graphGroup.add(hostLabel);

            // Remotes mapping
            const rad = 12;
            const angleStep = (Math.PI * 2) / remotes.length;

            remotes.forEach((r, i) => {
                const angle = i * angleStep;
                const nx = Math.cos(angle) * rad;
                const nz = Math.sin(angle) * rad;

                const rGeo = new THREE.SphereGeometry(2, 32, 32);
                const rMat = new THREE.MeshPhongMaterial({ color: sColor, shininess: 100 });
                const rMesh = new THREE.Mesh(rGeo, rMat);
                rMesh.position.set(nx, 0, nz);
                graphGroup.add(rMesh);

                const rLabel = createLabel(r.name, sColor);
                rLabel.position.set(nx, 4.0, nz);
                graphGroup.add(rLabel);

                // Connector Line
                const p = [];
                p.push(new THREE.Vector3(0,0,0));
                p.push(new THREE.Vector3(nx,0,nz));
                const lineGeo = new THREE.BufferGeometry().setFromPoints(p);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x666666, linewidth: 2, transparent:true, opacity:0.6 });
                const line = new THREE.Line(lineGeo, lineMat);
                graphGroup.add(line);
                
                // Animated data packets on line
                const pktGeo = new THREE.SphereGeometry(0.3, 8, 8);
                const pktMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const pkt = new THREE.Mesh(pktGeo, pktMat);
                graphGroup.add(pkt);

                // Add simple animation state
                pkt.userData = { angle: angle, rad: rad, progress: Math.random() };
                
            });
        }

        renderList();
        document.addEventListener('DOMContentLoaded', () => { setTimeout(init3D, 200); });

    </script>
</body>
</html>
