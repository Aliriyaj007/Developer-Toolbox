<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 7 - HTML Entity Encoder Decoder - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .entity-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
            min-height: 500px;
        }

        @media (min-width: 900px) {
            .entity-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            width: 100%;
            resize: none;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.2);
        }

        .options-row {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .radio-group {
            display: flex;
            gap: 1rem;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            user-select: none;
        }

        .radio-label input[type="radio"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-secondary);
            border-radius: 50%;
            display: grid;
            place-content: center;
            margin: 0;
            transition: all 0.2s;
        }

        .radio-label input[type="radio"]::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--accent-primary);
        }

        .radio-label input[type="radio"]:checked {
            border-color: var(--accent-primary);
        }

        .radio-label input[type="radio"]:checked::before {
            transform: scale(1);
        }

        .radio-label input[type="radio"]:checked+span {
            color: var(--accent-primary);
        }

        .btn-controls {
            display: flex;
            gap: 0.5rem;
        }

        .reference-table-container {
            margin-top: 3rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .reference-header {
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
        }

        .reference-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1px;
            background: var(--border-color);
        }

        .ref-item {
            background: var(--bg-main);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ref-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .ref-char {
            font-size: 1.2rem;
            color: var(--accent-primary);
            min-width: 30px;
            text-align: center;
        }

        .ref-entity {
            color: var(--text-secondary);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>

<body class="theme-dark">
    <div id="canvas-container"></div>

    <main class="main-content">
        <div class="container">
            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>7. HTML Entity Encoder Decoder</h1>
                    <p style="color: var(--text-secondary); margin-top: 0.5rem;">Safely escape code for HTML display or
                        revert entities back to characters.</p>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="options-row glass-panel" style="padding: 1rem 1.5rem;">
                <span class="text-secondary" style="font-weight:500;">Encoding Type:</span>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="enc-type" value="named" checked>
                        <span>Named Entities (&amp;lt;)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="enc-type" value="hex">
                        <span>Hexadecimal (&amp;#x3C;)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="enc-type" value="dec">
                        <span>Decimal (&amp;#60;)</span>
                    </label>
                </div>
            </div>

            <div class="entity-grid">
                <!-- Decoder/Input Panel -->
                <div class="glass-panel panel-container">
                    <div class="panel-header">
                        <h3>Raw Text (Decoded)</h3>
                        <div class="btn-controls">
                            <button id="btn-clear-raw" class="btn">Clear</button>
                            <button id="btn-paste-raw" class="btn">Paste</button>
                            <button id="btn-copy-raw" class="btn btn-primary">Copy</button>
                        </div>
                    </div>
                    <textarea id="raw-input"
                        placeholder="Type or paste raw text here... (e.g. <script>alert('xss');</script>)"></textarea>
                </div>

                <!-- Encoder/Output Panel -->
                <div class="glass-panel panel-container">
                    <div class="panel-header">
                        <h3>HTML Entities (Encoded)</h3>
                        <div class="btn-controls">
                            <button id="btn-clear-enc" class="btn">Clear</button>
                            <button id="btn-paste-enc" class="btn">Paste</button>
                            <button id="btn-copy-enc" class="btn btn-primary">Copy</button>
                        </div>
                    </div>
                    <textarea id="enc-input"
                        placeholder="Type or paste encoded text here... (e.g. &lt;script&gt;alert('xss');&lt;/script&gt;)"></textarea>
                </div>
            </div>

            <!-- Quick Reference -->
            <div class="reference-table-container">
                <div class="reference-header">Common Entities Quick Reference (Click to copy)</div>
                <div class="reference-list" id="ref-list">
                    <!-- Populated via JS -->
                </div>
            </div>

        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <!-- Three.js and GSAP for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/core.js"></script>

    <script>
        // --- Core Logic ---
        const rawInput = document.getElementById('raw-input');
        const encInput = document.getElementById('enc-input');
        const typeRadios = document.querySelectorAll('input[name="enc-type"]');

        let isEncoding = false;
        let isDecoding = false;

        // Named Entity Map
        const entityMap = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
            '/': '&#x2F;',
            '`': '&#x60;',
            '=': '&#x3D;'
        };

        const reverseEntityMap = Object.keys(entityMap).reduce((acc, key) => {
            acc[entityMap[key]] = key;
            return acc;
        }, {});

        // Add additional common ones for decoding robustness
        const decodeDiv = document.createElement('div');

        function encodeNamed(str) {
            return String(str).replace(/[&<>"'`=\/]/g, function (s) {
                return entityMap[s];
            });
        }

        function encodeHex(str) {
            return str.replace(/[\u00A0-\u9999<>\&"]/g, function (i) {
                return '&#x' + i.charCodeAt(0).toString(16) + ';';
            });
        }

        function encodeDec(str) {
            return str.replace(/[\u00A0-\u9999<>\&"]/g, function (i) {
                return '&#' + i.charCodeAt(0) + ';';
            });
        }

        function decodeEntities(str) {
            // Use browser's built-in decoding via a temporary element
            if (str && typeof str === 'string') {
                // strip script/html tags from being executed
                str = str.replace(/<script[^>]*>([\S\s]*?)<\/script>/gmi, '');
                decodeDiv.innerHTML = str;
                return decodeDiv.textContent || decodeDiv.innerText || "";
            }
            return "";
        }

        function handleRawInput() {
            if (isDecoding) return;
            isEncoding = true;

            const rawVal = rawInput.value;
            if (!rawVal) {
                encInput.value = '';
                trigger3D('reset');
                isEncoding = false;
                return;
            }

            const type = document.querySelector('input[name="enc-type"]:checked').value;
            let encoded = '';

            if (type === 'named') encoded = encodeNamed(rawVal);
            else if (type === 'hex') encoded = encodeHex(rawVal);
            else if (type === 'dec') encoded = encodeDec(rawVal);

            encInput.value = encoded;

            if (rawVal !== encoded) trigger3D('encode');

            isEncoding = false;
        }

        function handleEncodedInput() {
            if (isEncoding) return;
            isDecoding = true;

            const encVal = encInput.value;
            if (!encVal) {
                rawInput.value = '';
                trigger3D('reset');
                isDecoding = false;
                return;
            }

            const decoded = decodeEntities(encVal);
            rawInput.value = decoded;

            if (encVal !== decoded) trigger3D('decode');

            isDecoding = false;
        }

        // Event Listeners
        rawInput.addEventListener('input', handleRawInput);
        encInput.addEventListener('input', handleEncodedInput);

        typeRadios.forEach(radio => {
            radio.addEventListener('change', handleRawInput); // re-encode when type changes
        });

        // Setup Buttons
        const setupBtn = (id, action, targetInput) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('click', async () => {
                const originalText = btn.textContent;
                if (action === 'clear') {
                    targetInput.value = '';
                    targetInput.dispatchEvent(new Event('input'));
                } else if (action === 'paste') {
                    try {
                        const text = await navigator.clipboard.readText();
                        targetInput.value = text;
                        targetInput.dispatchEvent(new Event('input'));
                    } catch (err) {
                        console.error('Failed to read clipboard', err);
                    }
                } else if (action === 'copy') {
                    navigator.clipboard.writeText(targetInput.value);
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = originalText, 1500);
                }
            });
        };

        setupBtn('btn-clear-raw', 'clear', rawInput);
        setupBtn('btn-paste-raw', 'paste', rawInput);
        setupBtn('btn-copy-raw', 'copy', rawInput);

        setupBtn('btn-clear-enc', 'clear', encInput);
        setupBtn('btn-paste-enc', 'paste', encInput);
        setupBtn('btn-copy-enc', 'copy', encInput);


        // Populate Quick Reference
        const commonRefs = [
            { char: '<', name: '&lt;' }, { char: '>', name: '&gt;' },
            { char: '&', name: '&amp;' }, { char: '"', name: '&quot;' },
            { char: "'", name: '&#39;' }, { char: '©', name: '&copy;' },
            { char: '®', name: '&reg;' }, { char: '™', name: '&trade;' },
            { char: ' ', name: '&nbsp;' }, { char: '€', name: '&euro;' },
            { char: '£', name: '&pound;' }, { char: '¥', name: '&yen;' }
        ];

        const refList = document.getElementById('ref-list');
        commonRefs.forEach(ref => {
            const el = document.createElement('div');
            el.className = 'ref-item';
            el.innerHTML = `<span class="ref-char">${ref.char}</span><span class="ref-entity">${ref.name.replace('&', '&amp;')}</span>`;
            el.addEventListener('click', () => {
                navigator.clipboard.writeText(ref.name);
                // Visual feedback
                const origBg = el.style.background;
                el.style.background = 'rgba(51, 217, 178, 0.2)';
                setTimeout(() => el.style.background = origBg, 300);
            });
            refList.appendChild(el);
        });

        // --- 3D Background Setup (Morphing Tags) ---
        let scene, camera, renderer, tagGroup, bracketLeft, bracketRight, ampMesh;

        const trigger3D = (state) => {
            if (!tagGroup) return;

            gsap.killTweensOf(bracketLeft.rotation);
            gsap.killTweensOf(bracketLeft.position);
            gsap.killTweensOf(bracketRight.rotation);
            gsap.killTweensOf(bracketRight.position);
            gsap.killTweensOf(ampMesh.scale);
            gsap.killTweensOf(tagGroup.scale);

            if (state === 'encode') {
                // Morph to Entity (show &amp hide < >)
                gsap.to(bracketLeft.position, { x: -3, duration: 0.5 });
                gsap.to(bracketRight.position, { x: 3, duration: 0.5 });
                gsap.to(bracketLeft.rotation, { z: Math.PI, duration: 0.5 }); // turn away
                gsap.to(bracketRight.rotation, { z: Math.PI, duration: 0.5 });

                gsap.to(ampMesh.scale, { x: 1, y: 1, z: 1, duration: 0.5, delay: 0.2 });
                gsap.to(tagGroup.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.3, yoyo: true, repeat: 1 });

            } else if (state === 'decode' || state === 'reset') {
                // Morph to Tag (show < > hide &)
                gsap.to(ampMesh.scale, { x: 0.01, y: 0.01, z: 0.01, duration: 0.3 });

                gsap.to(bracketLeft.position, { x: -1, duration: 0.5, delay: 0.2 });
                gsap.to(bracketRight.position, { x: 1, duration: 0.5, delay: 0.2 });
                gsap.to(bracketLeft.rotation, { z: 0, duration: 0.5, delay: 0.2 });
                gsap.to(bracketRight.rotation, { z: 0, duration: 0.5, delay: 0.2 });

                if (state === 'decode') {
                    gsap.to(tagGroup.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.3, yoyo: true, repeat: 1 });
                }
            }
        };

        const init3D = () => {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 10;
            camera.position.y = 2; // Look down slightly

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0x03DAC6, 1);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            const dirLight2 = new THREE.DirectionalLight(0xBB86FC, 0.8);
            dirLight2.position.set(-5, -5, 5);
            scene.add(dirLight2);

            tagGroup = new THREE.Group();

            // Materials
            const matTag = new THREE.MeshStandardMaterial({ color: 0x33d9b2, metalness: 0.6, roughness: 0.2 });
            const matAmp = new THREE.MeshStandardMaterial({ color: 0xffb142, metalness: 0.6, roughness: 0.2 });

            // Create simple 3D shapes representing < > and & since TextGeometry requires font files

            // Bracket < (Two cylinders forming a V)
            bracketLeft = new THREE.Group();
            const cyl1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), matTag);
            cyl1.rotation.z = Math.PI / 4;
            cyl1.position.set(0, 0.5, 0);
            const cyl2 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), matTag);
            cyl2.rotation.z = -Math.PI / 4;
            cyl2.position.set(0, -0.5, 0);
            bracketLeft.add(cyl1, cyl2);
            bracketLeft.position.x = -1;

            // Bracket >
            bracketRight = new THREE.Group();
            const cyl3 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), matTag);
            cyl3.rotation.z = -Math.PI / 4;
            cyl3.position.set(0, 0.5, 0);
            const cyl4 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), matTag);
            cyl4.rotation.z = Math.PI / 4;
            cyl4.position.set(0, -0.5, 0);
            bracketRight.add(cyl3, cyl4);
            bracketRight.position.x = 1;

            // Ampersand approx (Torus knot)
            ampMesh = new THREE.Mesh(new THREE.TorusKnotGeometry(0.5, 0.15, 64, 8), matAmp);
            ampMesh.scale.set(0.01, 0.01, 0.01); // hidden initially

            tagGroup.add(bracketLeft);
            tagGroup.add(bracketRight);
            tagGroup.add(ampMesh);

            scene.add(tagGroup);

            const animate = () => {
                requestAnimationFrame(animate);

                tagGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.3;
                tagGroup.position.y = Math.sin(Date.now() * 0.002) * 0.2;

                if (ampMesh.scale.x > 0.1) {
                    ampMesh.rotation.y += 0.02;
                    ampMesh.rotation.x += 0.01;
                }

                renderer.render(scene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

        if (document.getElementById('canvas-container')) {
            init3D();
        }
    </script>
</body>

</html>
