<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 99 - GraphQL to REST Comparator - Developer Toolbox</title>
    <link rel="stylesheet" href="assets/core.css">
    <style>
        .specificity-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (min-width: 900px) {
            .specificity-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .score-display {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: bold;
        }

        .score-box {
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 80px;
            transition: all 0.3s;
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .score-inline {
            color: #ff5252;
            border-color: #ff5252;
        }

        .score-id {
            color: #ffb142;
            border-color: #ffb142;
        }

        .score-class {
            color: #33d9b2;
            border-color: #33d9b2;
        }

        .score-element {
            color: #34ace0;
            border-color: #34ace0;
        }

        .parts-list {
            list-style: none;
            margin-top: 1.5rem;
        }

        .parts-list li {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-mono);
            display: flex;
            justify-content: space-between;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: #000;
        }

        .badge-inline {
            background: #ff5252;
        }

        .badge-id {
            background: #ffb142;
        }

        .badge-class {
            background: #33d9b2;
        }

        .badge-element {
            background: #34ace0;
        }
    </style>
</head>

<body class="theme-dark">
    <div class="tool-canvas-container" id="canvas-container"></div>

    <main class="main-content">
        <div class="container">

            <div class="tool-header">
                <div>
                    <a href="index.html" class="back-link">← Back to Toolbox</a>
                    <h1>99. GraphQL to REST Comparator</h1>
                </div>
                <div>
                    <select id="theme-select" aria-label="Select Theme">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                        <option value="solarized">Solarized</option>
                        <option value="neon">Neon Glow</option>
                        <option value="highcontrast">High Contrast</option>
                    </select>
                </div>
            </div>

            <div class="specificity-grid">
                <!-- Input Panel -->
                <div class="glass-panel">
                    <h3>Analyze Selector</h3>
                    <p class="text-secondary mb-4">Type a CSS selector below to calculate its weight.</p>

                    <input type="text" id="selector-input" placeholder="e.g. div#app .btn:hover"
                        value="div#app .btn:hover" autocomplete="off" spellcheck="false"
                        style="font-family: var(--font-mono); font-size: 1.25rem;">

                    <div class="mt-4">
                        <h4>Common Examples</h4>
                        <div class="flex gap-2 mt-2" style="flex-wrap: wrap;">
                            <button class="btn btn-example" data-sel="a:hover">a:hover</button>
                            <button class="btn btn-example" data-sel="ul li:first-child">ul li:first-child</button>
                            <button class="btn btn-example" data-sel="#nav .active">#nav .active</button>
                            <button class="btn btn-example" data-sel="div.container > p">div.container > p</button>
                        </div>
                    </div>
                </div>

                <!-- Results Panel -->
                <div class="glass-panel">
                    <h3>Specificity Score</h3>

                    <div class="score-display">
                        <div class="score-box score-inline">
                            <div id="score-0">0</div>
                            <div class="score-label">Inline</div>
                        </div>
                        <div class="score-box score-id">
                            <div id="score-1">1</div>
                            <div class="score-label">IDs</div>
                        </div>
                        <div class="score-box score-class">
                            <div id="score-2">1</div>
                            <div class="score-label">Classes</div>
                        </div>
                        <div class="score-box score-element">
                            <div id="score-3">1</div>
                            <div class="score-label">Elements</div>
                        </div>
                    </div>

                    <h4>Breakdown</h4>
                    <ul class="parts-list" id="parts-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <footer class="global-footer">
        <div class="container">
            Made with ❤️ by <a href="https://github.com/Aliriyaj007" target="_blank">Aliriyaj007</a>
        </div>
    </footer>

    <script src="assets/core.js"></script>

    <!-- Parser via CDN for reliable CSS selector parsing -->
    <script src="https://unpkg.com/specificity@0.4.1/dist/specificity.js"></script>

    <script>
        // Tool Logic
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize tool
    });
  </script>

    <!-- Three.js Scene: Floating Specificity Cubes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let cubes = [];

        const colors = {
            inline: 0xff5252,
            id: 0xffb142,
            class: 0x33d9b2,
            element: 0x34ace0
        };

        const init3D = () => {
            const container = document.getElementById('canvas-container');
            if (!container || !window.THREE) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            camera.position.x = 8; // Offset to side

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            // Create initial cubes placeholder
            createCubes([0, 1, 1, 1]);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        const createCubes = (scores) => {
            // clear old cubes
            cubes.forEach(c => scene.remove(c));
            cubes = [];

            const counts = [
                { count: scores[0], color: colors.inline, baseZ: 0 },
                { count: scores[1], color: colors.id, baseZ: -2 },
                { count: scores[2], color: colors.class, baseZ: -4 },
                { count: scores[3], color: colors.element, baseZ: -6 }
            ];

            counts.forEach((layer, i) => {
                // limit count visually so it doesn't crash on high specifics
                const visualCount = Math.min(layer.count, 10);
                for (let j = 0; j < visualCount; j++) {
                    const size = layer.count > 0 ? (1 + (layer.count * 0.1)) : 1;
                    const geo = new THREE.BoxGeometry(size, size, size);
                    const mat = new THREE.MeshPhongMaterial({
                        color: layer.color,
                        transparent: true,
                        opacity: 0.8,
                        shininess: 100
                    });

                    const mesh = new THREE.Mesh(geo, mat);

                    // Random scatter based on layer
                    mesh.position.set(
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 8,
                        layer.baseZ + (Math.random() * 2)
                    );

                    // Store rotational speed
                    mesh.userData = {
                        rx: (Math.random() - 0.5) * 0.05,
                        ry: (Math.random() - 0.5) * 0.05
                    };

                    scene.add(mesh);
                    cubes.push(mesh);
                }
            });
        };

        // Called by main JS logic when score changes
        window.update3DScene = (scores) => {
            if (scene) createCubes(scores);
        };

        const animate = () => {
            requestAnimationFrame(animate);

            // Gently rotate cubes
            cubes.forEach(c => {
                c.rotation.x += c.userData.rx;
                c.rotation.y += c.userData.ry;
            });

            // Slowly rotate entire group slightly
            if (camera) {
                camera.position.y = Math.sin(Date.now() * 0.001) * 2;
                camera.lookAt(0, 0, -3);
            }

            renderer.render(scene, camera);
        };

        document.addEventListener('DOMContentLoaded', init3D);
    </script>
</body>

</html>
